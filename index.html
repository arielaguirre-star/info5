<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Info - 5to Año</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617; 
            color: #f1f5f9;
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .step-indicator {
            background: linear-gradient(90deg, #22d3ee, #818cf8);
            height: 4px;
            transition: width 0.5s ease;
        }

        .task-box {
            background: rgba(34, 211, 238, 0.05);
            border-left: 4px solid #22d3ee;
        }

        .challenge-box {
            background: rgba(167, 139, 250, 0.05);
            border-left: 4px solid #a78bfa;
        }
        
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            filter: brightness(1.2);
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="app-root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN (Cambia tus datos de Firebase aquí)
        const firebaseConfig = { apiKey: "AIzaSyBHZbh-cY2BJpxZ7rpMcX2UHGcicUyepE4", projectId: "info5-761af", authDomain: "info5-761af.firebaseapp.com",projectId: "info5-761af",storageBucket: "info5-761af.firebasestorage.app",messagingSenderId: "660443432782", appId: "1:660443432782:web:481e5db94c895cfad5001f" };
        const appId = 'lab-informatica-completo';
        
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch(e) { console.error("Firebase no configurado"); }

        window.state = {
            currentIdx: parseInt(localStorage.getItem('currentClassIdx')) || 0,
            studentName: localStorage.getItem('studentName') || '',
            studentLastName: localStorage.getItem('studentLastName') || '',
            loading: false
        };

        const clases = [
            { n: 1, t: "Algoritmos", icon: "fa-terminal", theory: "Secuencia lógica y finita de pasos para resolver un problema.", task: "Algoritmo para preparar un café con leche.", challenge: "¿Puede un algoritmo ser infinito?" },
            { n: 2, t: "Binario", icon: "fa-binary", theory: "Lenguaje base de las máquinas (0 y 1).", task: "Convierte el número 13 a binario.", challenge: "¿Por qué se usa binario y no decimal en los chips?" },
            { n: 3, t: "Lógica Booleana", icon: "fa-code-branch", theory: "Uso de AND, OR y NOT para evaluar condiciones.", task: "Resuelve: (Sol AND Vacaciones) OR (Lluvia).", challenge: "Si la alarma suena con PuertaAbierta=True, ¿qué operador usa?" },
            { 
                n: 4, t: "Compresión y Patrones", icon: "fa-file-archive", 
                theory: "Proceso de reducir el tamaño de un archivo buscando repeticiones. Es como usar abreviaturas en apuntes.", 
                task: "Comprime: 'Sol solecito, caliéntame un poquito, por hoy por mañana por toda la semana' usando símbolos.",
                challenge: "¿Por qué no podemos usar compresión 'con pérdida' en un archivo de texto o un programa?",
                extra: "Investiga: MP3 vs ZIP."
            },
            { 
                n: 5, t: "Arq. Von Neumann", icon: "fa-microchip", 
                theory: "Modelo base de la computación actual: CPU (procesa), Memoria (guarda) y Periféricos.", 
                task: "Actividad 'CPU Humana': ¿Qué hace la ALU cuando recibe la orden de sumar?",
                challenge: "Si la CPU es el cerebro, ¿por qué necesitamos RAM? ¿Por qué no leer todo del disco?"
            },
            { 
                n: 6, t: "RAM vs. Disco", icon: "fa-memory", 
                theory: "La RAM es rápida y volátil (mesa de trabajo). El Disco es lento y permanente (estante).", 
                task: "Representa el viaje de un dato desde el estante a la mesa al abrir un juego.",
                challenge: "Se corta la luz y no guardaste el Word. ¿Dónde estaba ese texto: en RAM o Disco?"
            },
            { 
                n: 7, t: "Sistemas Operativos", icon: "fa-desktop", 
                theory: "Software principal que gestiona el hardware. Es el director de la orquesta de programas.", 
                task: "Un alumno escribe en el pizarrón y otro borra. El SO debe decidir los turnos.",
                challenge: "¿Por qué un programa de Windows no funciona en Linux si el procesador es el mismo?"
            },
            { 
                n: 8, t: "Periféricos y Buses", icon: "fa-keyboard", 
                theory: "Forma en que la PC se comunica. Entrada (Teclado), Salida (Monitor) y E/S (Touch).", 
                task: "Actividad 'Bus Humano': Pasa un mensaje por una fila. Si el bus es lento, hay 'Lag'.",
                challenge: "¿Un módem es entrada, salida o ambos? Justifica tu respuesta."
            },
            { 
                n: 9, t: "Internet: Red de Redes", icon: "fa-globe", 
                theory: "Conexión global física (cables) y lógica de millones de redes privadas.", 
                task: "Corta un hilo de lana en la actividad 'La Telaraña'. ¿Cómo llega el mensaje ahora?",
                challenge: "El 99% de internet viaja por cables submarinos. ¿Qué ventaja tienen sobre el satélite?"
            },
            { 
                n: 10, t: "Protocolos e IP", icon: "fa-network-wired", 
                theory: "La IP es tu dirección única. El DNS es la guía que traduce nombres (google.com) a números.", 
                task: "Envía un mensaje usando solo números de IP de tus compañeros sin decir sus nombres.",
                challenge: "Si el DNS de tu proveedor falla, pero sabes la IP de Facebook de memoria, ¿podrías entrar?"
            },
            { 
                n: 11, t: "Ciberseguridad", icon: "fa-user-shield", 
                theory: "Protección de datos. La mayoría de los ataques usan engaños (Ingeniería Social) no virus.", 
                task: "Detective de Phishing: Identifica señales de alerta en un correo falso del banco.",
                challenge: "¿Qué diferencia a un Hacker de un Ciberdelincuente (Cracker)?"
            },
            { 
                n: 12, t: "Variables y Datos", icon: "fa-cube", 
                theory: "Espacios con nombre en memoria para guardar valores (Enteros, Texto, Booleanos).", 
                task: "Crea las 'Cajas' para un juego de fútbol: Puntaje, NombreJugador, EstaVivo.",
                challenge: "Si quiero guardar si un producto tiene descuento, ¿qué tipo de dato uso?"
            },
            { 
                n: 13, t: "Bucles y Condicionales", icon: "fa-redo", 
                theory: "Los IF toman decisiones. Los Bucles repiten tareas automáticamente.", 
                task: "Escribe la 'Rutina del Robot': SI la luz está apagada ENTONCES prenderla.",
                challenge: "Escribe en pseudocódigo: 'Caminar hasta que choque con una pared'."
            },
            { 
                n: 14, t: "IA y Futuro", icon: "fa-brain", 
                theory: "La IA aprende de patrones en datos, no de reglas fijas. Se entrena con ejemplos.", 
                task: "Entrena a un compañero para que reconozca frutas rojas. ¿Qué pasa si le das una manzana verde?",
                challenge: "Si la IA aprende de internet y hay prejuicios, ¿cómo afectará esto al futuro?"
            }
        ];

        window.render = () => {
            const root = document.getElementById('app-root');
            const c = clases[window.state.currentIdx];
            const progress = ((window.state.currentIdx + 1) / clases.length) * 100;

            root.innerHTML = `
                <nav class="p-6 md:px-12 flex justify-between items-center bg-slate-900/40 border-b border-white/5 backdrop-blur-md sticky top-0 z-50">
                    <div>
                        <h1 class="text-2xl font-black tracking-tighter italic">LAB<span class="text-cyan-400">INFO</span></h1>
                        <p class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-500">Ciencias de la Computación</p>
                    </div>
                    <div class="flex gap-4">
                        <input type="text" placeholder="Tu Nombre" value="${window.state.studentName}" oninput="saveName(this.value, 'name')" class="bg-slate-950 border border-white/10 px-4 py-2 rounded-xl text-xs outline-none focus:border-cyan-400">
                        <input type="text" placeholder="Tu Apellido" value="${window.state.studentLastName}" oninput="saveName(this.value, 'last')" class="bg-slate-950 border border-white/10 px-4 py-2 rounded-xl text-xs outline-none focus:border-cyan-400">
                    </div>
                </nav>

                <div class="step-indicator" style="width: ${progress}%"></div>

                <main class="max-w-4xl mx-auto p-6 md:py-16">
                    <div class="glass-card rounded-[3rem] overflow-hidden">
                        <div class="p-10 md:p-14 bg-gradient-to-br from-slate-900 to-slate-950 border-b border-white/5">
                            <div class="flex items-center justify-between mb-8">
                                <div class="w-16 h-16 rounded-2xl bg-cyan-500/10 text-cyan-400 flex items-center justify-center text-3xl border border-cyan-500/20">
                                    <i class="fas ${c.icon}"></i>
                                </div>
                                <span class="text-xs font-black text-slate-600 uppercase tracking-widest">Clase ${c.n} / ${clases.length}</span>
                            </div>
                            <h2 class="text-5xl font-extrabold text-white mb-6 italic tracking-tighter">${c.t}</h2>
                            <p class="text-xl text-slate-400 leading-relaxed font-medium">${c.theory}</p>
                        </div>

                        <div class="p-10 md:p-14 space-y-10">
                            <div class="task-box p-8 rounded-3xl">
                                <h4 class="text-cyan-400 font-black text-[10px] uppercase tracking-widest mb-4">Actividad en Clase</h4>
                                <p class="text-white text-lg font-bold italic leading-snug">"${c.task}"</p>
                            </div>

                            <div class="challenge-box p-8 rounded-3xl">
                                <h4 class="text-purple-400 font-black text-[10px] uppercase tracking-widest mb-4">El Desafío</h4>
                                <p class="text-slate-300 text-sm italic font-medium">${c.challenge}</p>
                            </div>

                            <div class="space-y-4">
                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-2">Tu Resolución</label>
                                <textarea id="answerInput" class="w-full h-48 bg-slate-950/50 border border-white/10 rounded-[2rem] p-8 text-white outline-none focus:border-cyan-400 transition-all text-lg font-medium resize-none" placeholder="Escribe aquí tu respuesta..."></textarea>
                                <button onclick="submitTask()" class="w-full bg-white text-black font-black py-6 rounded-[2rem] hover:bg-cyan-400 transition-all uppercase tracking-[0.2em] text-sm shadow-2xl active:scale-95">Enviar Clase ${c.n}</button>
                            </div>
                        </div>

                        <div class="px-10 py-8 bg-black/40 flex justify-between gap-6">
                            <button onclick="changeClass(-1)" ${window.state.currentIdx === 0 ? 'disabled' : ''} class="nav-btn flex-1 py-4 px-6 rounded-2xl border border-white/5 font-bold text-[10px] uppercase tracking-widest text-slate-500 disabled:opacity-10">
                                <i class="fas fa-chevron-left mr-2"></i> Anterior
                            </button>
                            <button onclick="changeClass(1)" ${window.state.currentIdx === clases.length - 1 ? 'disabled' : ''} class="nav-btn flex-1 py-4 px-6 rounded-2xl border border-cyan-500/30 font-bold text-[10px] uppercase tracking-widest text-cyan-400 disabled:opacity-10">
                                Siguiente <i class="fas fa-chevron-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                </main>

                <footer class="p-12 text-center text-slate-700 text-[10px] font-black uppercase tracking-[0.5em]">
                    Laboratorio Virtual Profe Informática &copy; 2024
                </footer>
            `;
        }

        window.saveName = (val, type) => {
            if(type === 'name') window.state.studentName = val;
            else window.state.studentLastName = val;
            localStorage.setItem('studentName', window.state.studentName);
            localStorage.setItem('studentLastName', window.state.studentLastName);
        };

        window.changeClass = (dir) => {
            window.state.currentIdx += dir;
            localStorage.setItem('currentClassIdx', window.state.currentIdx);
            render();
            window.scrollTo(0,0);
        };

        window.submitTask = async () => {
            const ans = document.getElementById('answerInput').value.trim();
            const name = window.state.studentName.trim();
            const last = window.state.studentLastName.trim();

            if(!ans || !name || !last) return alert("Por favor completa tu nombre, apellido y la respuesta.");

            try {
                if(db) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'responses'), {
                        student: `${last}, ${name}`,
                        classNum: clases[window.state.currentIdx].n,
                        className: clases[window.state.currentIdx].t,
                        content: ans,
                        timestamp: serverTimestamp()
                    });
                }
                alert("¡Excelente! Clase " + clases[window.state.currentIdx].n + " enviada correctamente.");
                document.getElementById('answerInput').value = "";
            } catch(e) {
                alert("Error al enviar. Verifica tu conexión.");
            }
        };

        render();
    </script>
</body>
</html>
