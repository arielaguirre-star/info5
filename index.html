<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase a Clase - Lab Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #020617; color: #f1f5f9; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-nav { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-nav:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="app-root" class="flex-grow flex flex-col"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURACIÓN FIREBASE (Cambiar aquí)
        const firebaseConfig = { apiKey: "AIzaSyBHZbh-cY2BJpxZ7rpMcX2UHGcicUyepE4", authDomain: "info5-761af.firebaseapp.com", projectId: "info5-761af", storageBucket: "info5-761af.firebasestorage.app", messagingSenderId: "660443432782", appId: "1:660443432782:web:481e5db94c895cfad5001f" };
        const appId = 'lab-clase-a-clase';
        
        let db, auth;

        window.state = {
            currentIdx: parseInt(localStorage.getItem('lastClass')) || 0,
            studentName: localStorage.getItem('studentName') || '',
            studentLastName: localStorage.getItem('studentLastName') || '',
            loading: true
        };

        const clases = [
            { n: 1, t: "Algoritmos", icon: "fa-terminal", theory: "Instrucciones lógicas y ordenadas.", task: "Escribe el algoritmo para cambiar una lámpara quemada." },
            { n: 2, t: "Binario", icon: "fa-binary", theory: "Lenguaje de ceros y unos.", task: "¿Cómo se escribe el 10 en binario?" },
            { n: 3, t: "Hardware", icon: "fa-microchip", theory: "Componentes físicos del sistema.", task: "¿Qué componente se encarga de procesar los datos?" }
            // Agrega aquí el resto de tus 14 clases siguiendo este formato
        ];

        async function init() {
            const app = initializeApp(firebaseConfig);
            db = getFirestore(app);
            auth = getAuth(app);
            await signInAnonymously(auth);
            window.state.loading = false;
            render();
        }

        window.move = (dir) => {
            const newIdx = window.state.currentIdx + dir;
            if (newIdx >= 0 && newIdx < clases.length) {
                window.state.currentIdx = newIdx;
                localStorage.setItem('lastClass', newIdx);
                render();
            }
        };

        window.send = async () => {
            const c = clases[window.state.currentIdx];
            const ans = document.getElementById('ans').value;
            if (!window.state.studentName || !ans) return alert("Faltan datos");

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'responses'), {
                student: `${window.state.studentLastName}, ${window.state.studentName}`,
                class: c.n,
                answer: ans,
                timestamp: serverTimestamp()
            });
            alert("¡Clase " + c.n + " enviada!");
        };

        function render() {
            const root = document.getElementById('app-root');
            const c = clases[window.state.currentIdx];

            root.innerHTML = `
                <nav class="p-6 border-b border-white/5 flex justify-between items-center bg-slate-950/50">
                    <h1 class="text-xl font-black italic">LAB<span class="text-cyan-400">INFO</span></h1>
                    <div class="flex gap-4">
                        <input type="text" placeholder="Nombre" value="${window.state.studentName}" oninput="window.state.studentName=this.value; localStorage.setItem('studentName', this.value)" class="bg-slate-900 border border-white/10 px-4 py-2 rounded-xl text-sm outline-none focus:border-cyan-400">
                        <input type="text" placeholder="Apellido" value="${window.state.studentLastName}" oninput="window.state.studentLastName=this.value; localStorage.setItem('studentLastName', this.value)" class="bg-slate-900 border border-white/10 px-4 py-2 rounded-xl text-sm outline-none focus:border-cyan-400">
                    </div>
                </nav>

                <main class="flex-grow flex items-center justify-center p-6">
                    <div class="max-w-3xl w-full glass rounded-[2.5rem] overflow-hidden shadow-2xl">
                        <div class="p-10 bg-gradient-to-br from-slate-900 to-slate-950 border-b border-white/5">
                            <div class="flex items-center gap-4 mb-6">
                                <span class="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest">Clase ${c.n} de ${clases.length}</span>
                            </div>
                            <h2 class="text-4xl font-black text-white mb-4 italic tracking-tighter">${c.t}</h2>
                            <p class="text-slate-400 text-lg leading-relaxed">${c.theory}</p>
                        </div>

                        <div class="p-10 space-y-8">
                            <div class="bg-white/5 p-6 rounded-2xl border border-white/5">
                                <h4 class="text-cyan-400 font-bold text-xs uppercase tracking-widest mb-2">Actividad</h4>
                                <p class="text-white text-xl font-medium italic">"${c.task}"</p>
                            </div>

                            <textarea id="ans" class="w-full h-40 bg-slate-950/50 border border-white/10 rounded-2xl p-6 text-white outline-none focus:border-cyan-400 transition" placeholder="Escribe tu respuesta aquí..."></textarea>
                            
                            <button onclick="send()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-cyan-400 transition-all uppercase tracking-widest text-sm shadow-xl">Enviar Tarea</button>
                        </div>

                        <div class="p-6 bg-black/20 flex justify-between gap-4">
                            <button onclick="move(-1)" ${window.state.currentIdx === 0 ? 'disabled' : ''} class="btn-nav flex-1 py-3 px-6 rounded-xl font-bold text-xs uppercase tracking-widest border border-white/10 disabled:opacity-20">
                                <i class="fas fa-chevron-left mr-2"></i> Anterior
                            </button>
                            <button onclick="move(1)" ${window.state.currentIdx === clases.length - 1 ? 'disabled' : ''} class="btn-nav flex-1 py-3 px-6 rounded-xl font-bold text-xs uppercase tracking-widest border border-white/10 disabled:opacity-20 text-cyan-400">
                                Siguiente <i class="fas fa-chevron-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                </main>
            `;
        }

        init();
    </script>
</body>
</html>
```
